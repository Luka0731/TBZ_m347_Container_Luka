name: kn04-ab

services:
  m347-kn04b-db:
    image: mariadb:latest
    container_name: m347-kn04b-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
    networks:
      kn04b-network:

  m347-kn04b-web:
    image: luka0731/m347:kn02b-web
    container_name: m347-kn04b-web
    ports:
      - "8080:80"
    depends_on:
      - m347-kn04b-db
    networks:
      kn04b-network:

networks:
  kn04b-network:
    ipam:
      config:
        - subnet: 172.11.0.0/16
          ip_range: 172.11.5.0/24
          gateway: 172.11.5.254